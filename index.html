<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Schafkopf Berlin Underground</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&family=Inter:wght@400;700;900&display=swap');

body {
    margin:0;
    font-family: Inter, sans-serif;
    background:#111;
    color:white;
    overflow-x:hidden;
}

.font-headline{font-family:Anton;}
.font-graffiti{font-family:"Permanent Marker";}

.berlin-sky {
    position:fixed;
    inset:0;
    background:linear-gradient(to bottom,#2e1065,#7c3aed,#fb923c,#111);
    z-index:-2;
}

.concrete-wall{
    background:#e5e5e5;
    color:black;
    border:3px solid white;
    padding:10px;
}
</style>
</head>

<body>
<div class="berlin-sky"></div>
<div id="root"></div>

<script type="text/babel">

const SUPABASE_URL = "https://hutbxkqhhgetbvnuqwce.supabase.co";
const SUPABASE_KEY = "YOUR_KEY";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const generateRoomCode = () =>
    Array.from({length:6},()=> "abcdefghijklmnopqrstuvwxyz0123456789"[Math.random()*36|0]).join("");

const generateOwnerToken = () =>
    Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);

function App(){

const [roomCode,setRoomCode]=React.useState("");
const [inputCode,setInputCode]=React.useState("");
const [isOwner,setIsOwner]=React.useState(false);

const [gameState,setGameState]=React.useState({
    game_count:0,
    players:[]
});

const [name,setName]=React.useState("");

React.useEffect(()=>{
if(!roomCode) return;

fetchRoom();

const channel = supabase.channel(`room-${roomCode}`)
.on("postgres_changes",
{event:"UPDATE",schema:"public",table:"schafkopf_sessions",filter:`room_code=eq.${roomCode}`},
(payload)=>{
setGameState({
game_count:payload.new.game_count,
players:payload.new.players
});
})
.subscribe();

return ()=> supabase.removeChannel(channel);
},[roomCode]);

async function fetchRoom(){
const {data}=await supabase.from("schafkopf_sessions")
.select("*")
.eq("room_code",roomCode)
.single();

if(data){
setGameState({game_count:data.game_count,players:data.players});
const token=localStorage.getItem("owner_"+roomCode);
setIsOwner(token===data.owner_token);
}
}

async function createRoom(){
const code=generateRoomCode();
const token=generateOwnerToken();

await supabase.from("schafkopf_sessions").insert([{
room_code:code,
game_count:0,
players:[],
owner_token:token
}]);

localStorage.setItem("owner_"+code,token);
setRoomCode(code);
setIsOwner(true);
}

async function joinRoom(e){
e.preventDefault();
setRoomCode(inputCode.trim().toLowerCase());
}

async function update(players,count){
const token=localStorage.getItem("owner_"+roomCode);

await supabase.from("schafkopf_sessions")
.update({players:players,game_count:count})
.eq("room_code",roomCode)
.eq("owner_token",token);
}

function addPlayer(){
if(!isOwner||!name.trim())return;

const newPlayers=[...gameState.players,{
name:name.trim(),
points:0,
history:[{round:0,val:0}]
}];

setGameState({...gameState,players:newPlayers});
setName("");
update(newPlayers,gameState.game_count);
}

function addPoints(i,val){
if(!isOwner)return;

const players=gameState.players.map((p,idx)=>{
if(idx===i){
const newVal=p.points+val;
return {...p,points:newVal,history:[...p.history,{round:p.history.length,val:newVal}]};
}
return p;
});

const count=gameState.game_count+1;
setGameState({players,game_count:count});
update(players,count);
}

if(!roomCode){
return(
<div className="flex items-center justify-center h-screen">
<div className="concrete-wall w-96">
<h1 className="font-headline text-4xl text-center">BERLIN</h1>

<button onClick={createRoom} className="w-full bg-red-600 text-white p-3 mt-4">
Raum erstellen
</button>

<form onSubmit={joinRoom} className="flex gap-2 mt-4">
<input className="flex-1 border p-2"
value={inputCode}
onChange={e=>setInputCode(e.target.value)}
placeholder="Code"/>
<button className="bg-black text-white px-3">Join</button>
</form>
</div>
</div>
);
}

return(
<div className="max-w-4xl mx-auto p-4">

<div className="concrete-wall mb-4">
<h1 className="font-headline text-3xl">SCHAFKOPF BERLIN</h1>
<p>Room: {roomCode}</p>
</div>

{isOwner &&
<div className="flex gap-2 mb-4">
<input className="border p-2 flex-1"
value={name}
onChange={e=>setName(e.target.value)}
placeholder="Spieler"/>
<button onClick={addPlayer} className="bg-red-600 text-white px-3">+</button>
</div>
}

<div className="grid gap-3">
{gameState.players.map((p,i)=>(
<div key={i} className="concrete-wall flex justify-between">
<div>{p.name}</div>
<div>{p.points}</div>
{isOwner &&
<div className="flex gap-1">
<button onClick={()=>addPoints(i,5)}>+5</button>
<button onClick={()=>addPoints(i,-5)}>-5</button>
</div>}
</div>
))}
</div>

</div>
);

}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
