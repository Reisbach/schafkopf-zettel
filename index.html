<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reisbach's Schafkopfzettel</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // SUPABASE KONFIGURATION (EINGEBAUTE LIVE-DATEN)
        // ==========================================
        const SUPABASE_URL = "https://hutbxkqhhgetbvnuqwce.supabase.co";
        const SUPABASE_KEY = "sb_publishable_reklbPGGESN7V2aAL059xQ_ib3jopaQ"; 

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Hilfsfunktion: Generiert einen 6-stelligen zufälligen Kleinbuchstaben/Zahlen-Code
        function generateRoomCode() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function SchafkopfApp() {
            const [roomCode, setRoomCode] = React.useState("");
            const [inputCode, setInputCode] = React.useState("");
            const [gameState, setGameState] = React.useState({ game_count: 0, players: [] });
            const [loading, setLoading] = React.useState(false);
            const [newPlayerName, setNewPlayerName] = React.useState("");

            // Echtzeit-Synchronisation (Abonniere Änderungen in der Datenbank)
            React.useEffect(() => {
                if (!roomCode) return;

                // Hole aktuellen Stand beim Betreten des Raums
                fetchCurrentState(roomCode);

                const channel = supabase
                    .channel(`public:schafkopf_sessions:room_code=eq.${roomCode}`)
                    .on('postgres_changes', { 
                        event: 'UPDATE', 
                        schema: 'public', 
                        table: 'schafkopf_sessions',
                        filter: `room_code=eq.${roomCode}`
                    }, (payload) => {
                        console.log("Echtzeit-Update empfangen:", payload.new);
                        setGameState({
                            game_count: payload.new.game_count,
                            players: payload.new.players
                        });
                    })
                    .subscribe();

                return () => {
                    supabase.removeChannel(channel);
                };
            }, [roomCode]);

            // Daten aus der DB laden
            async function fetchCurrentState(code) {
                setLoading(true);
                const { data, error } = await supabase
                    .from('schafkopf_sessions')
                    .select('*')
                    .eq('room_code', code)
                    .maybeSingle();
                
                if (data) {
                    setGameState({ game_count: data.game_count, players: data.players });
                }
                setLoading(false);
            }

            // In DB speichern
            async function saveToSupabase(updatedPlayers, updatedCount) {
                if (!roomCode) return;
                const { error } = await supabase
                    .from('schafkopf_sessions')
                    .update({ players: updatedPlayers, game_count: updatedCount })
                    .eq('room_code', roomCode);
                
                if (error) console.error("Fehler beim Speichern:", error);
            }

            // Aktion: Raum erstellen
            async function handleCreateRoom() {
                setLoading(true);
                const newCode = generateRoomCode();
                
                const { error } = await supabase
                    .from('schafkopf_sessions')
                    .insert([{ room_code: newCode, game_count: 0, players: [] }]);

                if (!error) {
                    setRoomCode(newCode);
                } else {
                    alert("Fehler beim Erstellen des Raums. Bitte nochmal versuchen.");
                }
                setLoading(false);
            }

            // Aktion: Raum beitreten
            async function handleJoinRoom(e) {
                e.preventDefault();
                const cleanCode = inputCode.trim().toLowerCase();
                if (cleanCode.length !== 6) {
                    alert("Der Code muss genau 6 Zeichen lang sein!");
                    return;
                }

                setLoading(true);
                const { data, error } = await supabase
                    .from('schafkopf_sessions')
                    .select('room_code')
                    .eq('room_code', cleanCode)
                    .maybeSingle();

                if (data) {
                    setRoomCode(cleanCode);
                } else {
                    alert("Raum-Code wurde nicht gefunden!");
                }
                setLoading(false);
            }

            // Aktion: Spieler hinzufügen
            function handleAddPlayer(e) {
                e.preventDefault();
                if (!newPlayerName.trim()) return;

                const newPlayer = {
                    name: newPlayerName.trim(),
                    points: 0,
                    history: [{ round: 0, val: 0 }]
                };

                const updatedPlayers = [...gameState.players, newPlayer];
                setGameState(prev => ({ ...prev, players: updatedPlayers }));
                setNewPlayerName("");
                
                saveToSupabase(updatedPlayers, gameState.game_count);
            }

            // Aktion: Punkte anpassen (+10 für Testzwecke)
            function handleAddPointsTest(index) {
                const updatedPlayers = gameState.players.map((player, i) => {
                    if (i === index) {
                        const nextRound = player.history.length;
                        const nextPoints = player.points + 10;
                        return {
                            ...player,
                            points: nextPoints,
                            history: [...player.history, { round: nextRound, val: nextPoints }]
                        };
                    }
                    return player;
                });

                const nextGameCount = gameState.game_count + 1;
                setGameState({ game_count: nextGameCount, players: updatedPlayers });
                saveToSupabase(updatedPlayers, nextGameCount);
            }

            // LADE-BILDSCHIRM
            if (loading) {
                return (
                    <div class="flex items-center justify-center min-h-screen">
                        <p class="text-xl text-emerald-400 animate-pulse">Verbindung mit Supabase wird aufgebaut...</p>
                    </div>
                );
            }

            // LOBBY (Raum erstellen oder Code eingeben)
            if (!roomCode) {
                return (
                    <div class="max-w-md mx-auto mt-20 p-6 bg-slate-800 rounded-xl shadow-xl border border-slate-700">
                        <h1 class="text-2xl font-bold text-center text-emerald-400 mb-8">Reisbach's Schafkopfzettel</h1>
                        
                        <button 
                            onClick={handleCreateRoom}
                            class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-semibold transition mb-8 shadow-md text-white"
                        >
                            ➕ Neuen Spielraum erstellen
                        </button>

                        <div class="relative flex py-4 items-center">
                            <div class="flex-grow border-t border-slate-600"></div>
                            <span class="flex-shrink mx-4 text-slate-400 text-sm font-semibold">ODER</span>
                            <div class="flex-grow border-t border-slate-600"></div>
                        </div>

                        <form onSubmit={handleJoinRoom} class="mt-4">
                            <label class="block text-sm text-slate-400 mb-2 text-center">Bestehendem Raum beitreten:</label>
                            <div class="flex gap-2">
                                <input 
                                    type="text" 
                                    maxLength="6"
                                    value={inputCode}
                                    onChange={(e) => setInputCode(e.target.value)}
                                    placeholder="z.B. xy47za"
                                    class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-center font-mono text-xl lowercase tracking-widest text-emerald-300 focus:outline-none focus:border-emerald-500"
                                />
                                <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-6 rounded-lg font-semibold transition text-white">
                                    Beitreten
                                </button>
                            </div>
                        </form>
                    </div>
                );
            }

            // DAS INGAME-DASHBOARD (Wenn man in einem Raum ist)
            return (
                <div class="max-w-4xl mx-auto p-4">
                    {/* Status-Bar */}
                    <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700 mb-6">
                        <div>
                            <h1 class="text-xl font-bold text-emerald-400">Reisbach's Schafkopfzettel</h1>
                            <p class="text-xs text-slate-400">Spiele absolviert: {gameState.game_count}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs block text-slate-400">Raum-Code für Freunde:</span>
                            <span class="font-mono text-2xl font-bold text-amber-400 tracking-wider lowercase bg-slate-900 px-3 py-1 rounded border border-amber-500/30">
                                {roomCode}
                            </span>
                        </div>
                    </div>

                    {/* Spieler hinzufügen */}
                    <form onSubmit={handleAddPlayer} class="flex gap-2 mb-6 max-w-md">
                        <input 
                            type="text"
                            value={newPlayerName}
                            onChange={(e) => setNewPlayerName(e.target.value)}
                            placeholder="Name des Spielers..."
                            class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500"
                        />
                        <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 px-4 rounded-lg font-semibold transition text-white">
                            Spieler hinzufügen
                        </button>
                    </form>

                    {/* Aktive Spielerkartei */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {gameState.players.length === 0 ? (
                            <p class="text-slate-400 italic col-span-2 text-center py-8 bg-slate-800/50 rounded-xl border border-dashed border-slate-700">
                                Noch keine Spieler im Raum. Trage oben die Spieler ein!
                            </p>
                        ) : (
                            gameState.players.map((player, index) => (
                                <div key={index} class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center shadow-md">
                                    <div>
                                        <h3 class="text-lg font-bold">{player.name}</h3>
                                        <p class="text-2xl font-mono font-bold text-emerald-400 mt-1">
                                            {player.points} <span class="text-sm font-normal text-slate-400">Punkte</span>
                                        </p>
                                        <p class="text-xs text-slate-500 mt-1 truncate max-w-xs">
                                            Verlauf: {player.history.map(h => h.val).join(" ➔ ")}
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => handleAddPointsTest(index)}
                                        class="bg-slate-700 hover:bg-slate-600 border border-slate-600 px-3 py-2 rounded-lg text-sm transition text-white"
                                    >
                                        ➕ 10 Pkt
                                    </button>
                                </div>
                            ))
                        )}
                    </div>
                    
                    <button 
                        onClick={() => setRoomCode("")} 
                        class="mt-12 text-sm text-slate-500 hover:text-red-400 transition block mx-auto text-center"
                    >
                        ⬅ Raum verlassen & Zur Lobby
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SchafkopfApp />);
    </script>
</body>
</html>
